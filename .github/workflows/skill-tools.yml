name: Skill Quality

on:
  push:
    paths-ignore:
      - 'archive/**'
      - 'artifacts/**'
  pull_request:
    paths-ignore:
      - 'archive/**'
      - 'artifacts/**'
  workflow_dispatch:

jobs:
  quality-gate:
    name: Quality gate (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install MCP dependencies
        run: python -m pip install "paho-mqtt>=1.6,<3" "pyserial>=3.5,<4"
      - name: Run truthful local gate
        run: python scripts/quick_gate.py --strict
      - name: Run iteration contract
        run: python scripts/skill_iterate.py --check --skip-self-test

  mcp-protocol:
    name: MCP protocol self-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install MCP dependencies
        run: python -m pip install "paho-mqtt>=1.6,<3" "pyserial>=3.5,<4"
      - name: MQTT MCP
        run: python mcp/mqtt_server.py --self-test
      - name: OTA MCP
        run: python mcp/ota_server.py --self-test
      - name: Serial MCP
        run: python mcp/serial_server.py --self-test
