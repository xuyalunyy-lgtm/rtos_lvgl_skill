name: FreeRTOS Project Review Template

on:
  workflow_dispatch:
    inputs:
      skill_repository:
        description: 'Git repository containing this Skill'
        required: true
        type: string
      source_directory:
        description: 'Firmware source directory to review'
        default: '.'
        required: true
        type: string

jobs:
  freertos-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout firmware project
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Checkout Skill
        run: git clone --depth 1 "${{ inputs.skill_repository }}" /tmp/freertos-skill
      - name: Run static review
        run: python /tmp/freertos-skill/tools/run_review.py --dir "${{ inputs.source_directory }}" --json > review_results.json || test $? -eq 1
      - name: Upload review report
        uses: actions/upload-artifact@v4
        with:
          name: freertos-review-results
          path: review_results.json
