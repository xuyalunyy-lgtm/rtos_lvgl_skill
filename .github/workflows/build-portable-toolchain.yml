name: Build portable LVGL toolchain

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'toolchain-win-x64-*'
    paths:
      - 'mcp/toolchain_resolver.py'
      - 'runtime/toolchain/**'
      - 'scripts/package_toolchain.py'
      - 'scripts/embed_toolchain.py'
      - 'assets/toolchains/**'
      - 'scripts/install_toolchain.ps1'
      - 'scripts/install_toolchain.cmd'
      - 'scripts/compiler_self_test.py'
      - 'tests/test_toolchain_resolver.py'
      - '.github/workflows/build-portable-toolchain.yml'
  pull_request:
    paths:
      - 'mcp/toolchain_resolver.py'
      - 'runtime/toolchain/**'
      - 'scripts/package_toolchain.py'
      - 'scripts/embed_toolchain.py'
      - 'assets/toolchains/**'
      - 'scripts/install_toolchain.ps1'
      - 'scripts/install_toolchain.cmd'
      - 'scripts/compiler_self_test.py'
      - 'tests/test_toolchain_resolver.py'
      - '.github/workflows/build-portable-toolchain.yml'

permissions:
  contents: write

jobs:
  resolver-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --disable-pip-version-check pytest
      - run: python -m pytest tests/test_toolchain_resolver.py -q

  package-win-x64:
    needs: resolver-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
      - name: Locate MSYS2 installation
        shell: msys2 {0}
        run: cygpath -w / > "$GITHUB_WORKSPACE/msys2-root.txt"
      - name: Assert pinned compiler version
        shell: msys2 {0}
        run: |
          test "$(gcc -dumpfullversion)" = "16.1.0"
          pacman -Q > "$GITHUB_WORKSPACE/msys2-package-lock.txt"
      - name: Package relocatable payload
        shell: pwsh
        run: |
          $MsysRoot = (Get-Content msys2-root.txt -Raw).Trim()
          python scripts/package_toolchain.py `
            --msys2-root $MsysRoot `
            --output staging/win-x64 `
            --gcc-version 16.1.0 `
            --revision 1 `
            --package-lock msys2-package-lock.txt `
            --archive dist/lvgl-ui-toolchain-win-x64-16.1.0-r1.zip
      - name: Verify unpacked payload through production resolver
        run: python scripts/compiler_self_test.py --toolchain-dir staging/win-x64 --verbose
      - name: Verify committed offline bundle is reproducible
        shell: pwsh
        run: |
          python scripts/embed_toolchain.py `
            --archive dist/lvgl-ui-toolchain-win-x64-16.1.0-r1.zip
          git diff --exit-code -- `
            runtime/toolchain/manifest.json `
            assets/toolchains/win-x64/
      - name: Verify first-use offline bootstrap
        run: python scripts/compiler_self_test.py
      - name: Verify clean ZIP installation path
        shell: pwsh
        run: |
          Remove-Item -LiteralPath staging/win-x64 -Recurse -Force
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/install_toolchain.ps1 `
            -ArchivePath dist/lvgl-ui-toolchain-win-x64-16.1.0-r1.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: lvgl-ui-toolchain-win-x64-16.1.0-r1
          path: |
            dist/lvgl-ui-toolchain-win-x64-16.1.0-r1.zip
            dist/lvgl-ui-toolchain-win-x64-16.1.0-r1.zip.sha256
          retention-days: 14
      - name: Publish immutable release assets
        if: startsWith(github.ref, 'refs/tags/toolchain-win-x64-')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" `
            dist/lvgl-ui-toolchain-win-x64-16.1.0-r1.zip `
            dist/lvgl-ui-toolchain-win-x64-16.1.0-r1.zip.sha256 `
            --verify-tag `
            --title "LVGL portable toolchain win-x64 16.1.0-r1" `
            --notes "C-only MinGW-w64 UCRT64 toolchain for the LVGL MCP. Includes per-file and archive SHA256 verification metadata."
