name: Build LVGL Simulator

on:
  push:
    paths:
      - 'native/lvgl_sim_runner/**'
      - 'mcp/lvgl_ir/**'
      - 'mcp/asset_contract.py'
      - 'mcp/high_level_tools.py'
      - 'mcp/high_level_schemas.py'
      - 'mcp/standard_ui_package.py'
      - 'tests/test_asset_contract.py'
      - 'tests/ci_generate_asset_contract_fixture.py'
      - '.github/workflows/build-lvgl-simulator.yml'
  pull_request:
    paths:
      - 'native/lvgl_sim_runner/**'
      - 'mcp/lvgl_ir/**'
      - 'mcp/asset_contract.py'
      - 'mcp/high_level_tools.py'
      - 'mcp/high_level_schemas.py'
      - 'mcp/standard_ui_package.py'
      - 'tests/test_asset_contract.py'
      - 'tests/ci_generate_asset_contract_fixture.py'
      - '.github/workflows/build-lvgl-simulator.yml'
  workflow_dispatch:

env:
  LVGL_VERSION: "v9.2.2"
  LVGL_REPO: "https://github.com/lvgl/lvgl.git"

jobs:
  asset-contract-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    name: Asset contract Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run deterministic asset contract tests
        run: |
          python -m pip install --disable-pip-version-check pytest Pillow
          python -m pytest tests/test_asset_contract.py tests/test_firmware_asset_closure.py -q

  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            artifact_name: lvgl_sim_v9.exe
          - os: ubuntu-latest
            platform: linux-x64
            artifact_name: lvgl_sim_v9

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - name: Checkout skill repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scene and asset protocol tests
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check pytest Pillow
          python -m pytest tests/lvgl -q

      - name: Generate deterministic asset contract fixture
        run: python tests/ci_generate_asset_contract_fixture.py

      - name: Checkout LVGL
        uses: actions/checkout@v4
        with:
          repository: lvgl/lvgl
          ref: ${{ env.LVGL_VERSION }}
          path: lvgl-source

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S native/lvgl_sim_runner -B build \
            -DLVGL_ROOT="$GITHUB_WORKSPACE/lvgl-source" \
            -DASSET_CONTRACT_DIR="$GITHUB_WORKSPACE/artifacts/asset_contract_ci/generated" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Verify binary exists
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            test -f build/Release/lvgl_sim_v9.exe || test -f build/lvgl_sim_v9.exe
          else
            test -f build/lvgl_sim_v9
          fi
        shell: bash

      - name: Run --version
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXE=$(find build -name lvgl_sim_v9.exe | head -1)
          else
            EXE=build/lvgl_sim_v9
          fi
          $EXE --version
        shell: bash

      - name: Run --self-test
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXE=$(find build -name lvgl_sim_v9.exe | head -1)
          else
            EXE=build/lvgl_sim_v9
          fi
          $EXE --self-test
        shell: bash

      - name: Verify generated asset descriptors compile and link
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            HARNESS=$(find build -name lvgl_asset_link_harness.exe | head -1)
          else
            HARNESS=build/lvgl_asset_link_harness
          fi
          test -n "$HARNESS"
          "$HARNESS"
          python -c "import json; from pathlib import Path; p=Path('artifacts/asset_contract_ci/generated/asset_compile_evidence.json'); p.write_text(json.dumps({'status':'verified','lvgl_version':'${{ env.LVGL_VERSION }}','platform':'${{ matrix.platform }}'}, indent=2) + '\n')"

      - name: Verify resolved asset.pack with native runner
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXE=$(find build -name lvgl_sim_v9.exe | head -1)
          else
            EXE=build/lvgl_sim_v9
          fi
          $EXE --scene artifacts/asset_contract_ci/generated/scene.bin --assets artifacts/asset_contract_ci/generated/asset.pack --output artifacts/asset_contract_ci/native_render --width 48 --height 80

      - name: Create test scene
        shell: bash
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'mcp')
          from lvgl_ir.scene_encoder import encode_spec
          spec = {
              'schema_version': '2.0',
              'page_name': 'test',
              'display': {'width': 480, 'height': 800},
              'lvgl_version': 'v9',
              'nodes': [
                  {'id': 'root', 'type': 'screen'},
                  {'id': 'title', 'type': 'label', 'parent_id': 'root', 'text': 'CI Test'},
                  {'id': 'pixel', 'type': 'image', 'parent_id': 'root', 'src': 'CI_PIXEL'},
              ]
          }
          data = encode_spec(spec)
          from lvgl_ir.asset_pack import encode_pack
          import pathlib
          pathlib.Path('artifacts/ci_test').mkdir(parents=True, exist_ok=True)
          pathlib.Path('artifacts/ci_test/scene.bin').write_bytes(data)
          pathlib.Path('artifacts/ci_test/assets.pack').write_bytes(encode_pack([{
              'ok': True, 'symbol': 'CI_PIXEL', 'width': 1, 'height': 1,
              'format_id': 1, 'pixel_data': b'\\x00\\xf8', 'alpha_data': b'',
          }]))
          print(f'Scene: {len(data)} bytes')
          "

      - name: Render test scene
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXE=$(find build -name lvgl_sim_v9.exe | head -1)
          else
            EXE=build/lvgl_sim_v9
          fi
          $EXE --scene artifacts/ci_test/scene.bin --assets artifacts/ci_test/assets.pack --output artifacts/ci_test/render --width 480 --height 800
        shell: bash

      - name: Verify render output
        shell: bash
        run: |
          python -c "
          from pathlib import Path
          ppm = Path('artifacts/ci_test/render/render.ppm')
          tree = Path('artifacts/ci_test/render/object_tree.bin')
          assert ppm.is_file(), 'render.ppm not found'
          assert tree.is_file(), 'object_tree.bin not found'
          assert ppm.stat().st_size > 100, f'render.ppm too small: {ppm.stat().st_size}'
          assert tree.stat().st_size > 20, f'object_tree.bin too small: {tree.stat().st_size}'
          print(f'render.ppm: {ppm.stat().st_size} bytes')
          print(f'object_tree.bin: {tree.stat().st_size} bytes')
          print('PASS: Render output verified')
          "

      - name: Compute SHA256
        id: sha256
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXE=$(find build -name lvgl_sim_v9.exe | head -1)
          else
            EXE=build/lvgl_sim_v9
          fi
          SHA=$(sha256sum "$EXE" | cut -d' ' -f1)
          echo "hash=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p "staging/${{ matrix.platform }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXE=$(find build -name lvgl_sim_v9.exe | head -1)
          else
            EXE=build/lvgl_sim_v9
          fi
          cp "$EXE" "staging/${{ matrix.platform }}/${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lvgl-sim-${{ matrix.platform }}
          path: staging/${{ matrix.platform }}/

      - name: Upload asset contract evidence
        uses: actions/upload-artifact@v4
        with:
          name: asset-contract-evidence-${{ matrix.platform }}
          path: |
            artifacts/asset_contract_ci/generated/resolved_asset_manifest.json
            artifacts/asset_contract_ci/generated/asset_resolution_report.json
            artifacts/asset_contract_ci/generated/resource_closure_report.json
            artifacts/asset_contract_ci/generated/asset_compile_evidence.json
            artifacts/asset_contract_ci/native_render/

  # ── Merge manifests ──────────────────────────────────────────────
  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: lvgl-sim-win-x64
          path: staging/win-x64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: lvgl-sim-linux-x64
          path: staging/linux-x64

      - name: Generate manifest
        run: |
          python -c "
          import json, hashlib, os
          from pathlib import Path

          manifest = {
              'schema_version': 1,
              'scene_protocol_version': 1,
              'lvgl_version': '${{ env.LVGL_VERSION }}',
              'runners': {},
          }

          output = Path('runtime/simulator')
          output.mkdir(parents=True, exist_ok=True)
          for platform_dir in Path('staging').iterdir():
              if not platform_dir.is_dir():
                  continue
              target_dir = output / platform_dir.name
              target_dir.mkdir(parents=True, exist_ok=True)
              for runner_file in platform_dir.iterdir():
                  if runner_file.name.startswith('lvgl_sim'):
                      target = target_dir / runner_file.name
                      target.write_bytes(runner_file.read_bytes())
                      sha = hashlib.sha256(runner_file.read_bytes()).hexdigest()
                      key = f'{platform_dir.name}/v9'
                      manifest['runners'][key] = {
                          'file': f'{platform_dir.name}/{runner_file.name}',
                          'sha256': sha,
                          'self_test': True,
                      }

          Path('runtime/simulator/manifest.json').write_text(
              json.dumps(manifest, indent=2)
          )
          print(json.dumps(manifest, indent=2))
          "

      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: lvgl-simulator-package
          path: runtime/simulator/
