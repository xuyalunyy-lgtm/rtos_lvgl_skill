# SDK 抽象操作注册表
# 所有 checker 和约束规则通过此文件的标准操作名引用 SDK API
# 具体 API 名在 platforms/xxx_sdk_map.yaml 中定义

version: "1.0.0"
description: >
  标准操作注册表。每个操作有一个唯一 ID（如 SEM_TAKE），checker 通过
  sdk_lookup.py 查询该操作在当前平台的具体 API 列表。

  平台映射约定：
  - 在 platforms/xxx_sdk_map.yaml 中，如果某操作在该平台不存在对应 API，
    可设置 unsupported: true 并附带 reason 说明原因。
  - sdk_lookup.py 的 validate() 会跳过 unsupported 的操作，不报告为空。

# ============================================================
# 1. RTOS 同步原语
# ============================================================

rtos_semaphore:
  SEM_CREATE:
    description: "创建信号量"
    semantics: "返回句柄，失败返回 NULL"
  SEM_TAKE:
    description: "获取信号量（阻塞等待）"
    semantics: "timeout 参数必须有限值，ISR 中禁止"
    checker_hints:
      - must_have_timeout
      - isr_forbidden
      - hot_path_forbidden
  SEM_GIVE:
    description: "释放信号量"
    semantics: "ISR 中必须用 FromISR 变体"
    checker_hints:
      - isr_needs_from_isr
  SEM_DELETE:
    description: "删除信号量"

rtos_mutex:
  MUTEX_CREATE:
    description: "创建互斥锁（带优先级继承）"
    semantics: "二进制信号量不可替代互斥锁保护共享状态"
    checker_hints:
      - binary_sem_not_substitute
  MUTEX_LOCK:
    description: "锁定互斥锁"
    semantics: "timeout 参数必须有限值"
    checker_hints:
      - must_have_timeout
      - hot_path_forbidden
      - hold_no_blocking_io
  MUTEX_UNLOCK:
    description: "解锁互斥锁"
  MUTEX_DELETE:
    description: "删除互斥锁"

rtos_queue:
  QUEUE_CREATE:
    description: "创建队列"
    checker_hints:
      - must_check_return
  QUEUE_SEND:
    description: "入队"
    semantics: "ISR 中必须非阻塞，成功后所有权转移"
    checker_hints:
      - isr_must_non_blocking
      - ownership_transfer
      - post_success_forbidden
  QUEUE_RECV:
    description: "出队"
    checker_hints:
      - must_have_timeout
  QUEUE_OVERWRITE:
    description: "覆写队列（仅用于状态型事件）"
    semantics: "队列深度为 1，新值覆盖旧值"
  QUEUE_DELETE:
    description: "删除队列"

# ============================================================
# 2. RTOS 任务管理
# ============================================================

rtos_task:
  TASK_CREATE:
    description: "创建任务"
    checker_hints:
      - must_check_return
      - no_duplicate_create
      - stack_size_in_words_or_bytes
  TASK_DELETE:
    description: "删除任务"
  TASK_DELAY:
    description: "任务延时"
    checker_hints:
      - lvgl_mutex_forbidden
      - isr_forbidden
      - hot_path_forbidden
  TASK_NOTIFY_GIVE:
    description: "任务通知发送（轻量级同步）"
    semantics: "ISR-safe，O(1)，替代二进制信号量"
  TASK_NOTIFY_TAKE:
    description: "等待任务通知"
  TASK_PRIORITY_SET:
    description: "运行时修改任务优先级"
    checker_hints:
      - needs_documentation

# ============================================================
# 3. RTOS 定时器
# ============================================================

rtos_timer:
  TIMER_CREATE:
    description: "创建软件定时器"
    checker_hints:
      - callback_must_not_block
  TIMER_START:
    description: "启动定时器"
  TIMER_STOP:
    description: "停止定时器"
  TIMER_DELETE:
    description: "删除定时器"

# ============================================================
# 4. RTOS 临界区 / 中断控制
# ============================================================

rtos_critical:
  CRITICAL_ENTER:
    description: "进入临界区（关中断）"
    checker_hints:
      - must_be_short
      - budget_required
      - heavy_work_forbidden
  CRITICAL_EXIT:
    description: "退出临界区（开中断）"
    semantics: "必须与 CRITICAL_ENTER 配对"
  IRQ_DISABLE:
    description: "全局关中断"
    checker_hints:
      - must_be_short
      - hot_path_forbidden
  IRQ_ENABLE:
    description: "全局开中断"
  IRQ_YIELD:
    description: "ISR 中触发上下文切换"
    semantics: "唤醒高优先级任务后必须调用"

# ============================================================
# 5. 内存管理
# ============================================================

memory:
  HEAP_ALLOC:
    description: "通用堆分配"
    checker_hints:
      - must_check_null
      - isr_forbidden
      - hot_path_forbidden
  HEAP_FREE:
    description: "堆释放"
    checker_hints:
      - null_safe
      - hot_path_forbidden
  HEAP_ALLOC_DMA:
    description: "DMA 可用内存分配"
    semantics: "必须 cache line 对齐"
  HEAP_ALLOC_EXTERNAL:
    description: "外部 RAM 分配（PSRAM/SPIRAM）"
    semantics: "优先使用，失败回退 internal SRAM"
  HEAP_FREE_SIZE:
    description: "查询剩余堆大小"
    semantics: "需要 per-kind 细分，不能只用总量"
  MEM_POOL_ALLOC:
    description: "静态内存池分配"

# ============================================================
# 6. RTOS 临界常量
# ============================================================

rtos_constants:
  TIMEOUT_FOREVER:
    description: "永久等待常量"
    checker_hints:
      - most_contexts_forbidden
  TIMEOUT_ZERO:
    description: "非阻塞（立即返回）"
  MS_TO_TICKS:
    description: "毫秒转 tick 宏"

# ============================================================
# 7. cJSON
# ============================================================

cjson:
  PARSE:
    description: "解析 JSON 字符串"
    checker_hints:
      - must_have_delete_pair
      - isr_forbidden
      - hot_path_forbidden
      - critical_section_forbidden
  DELETE:
    description: "释放 JSON 对象树"
    semantics: "NULL 安全"
  CREATE:
    description: "创建 JSON 对象/数组"
  ADD_ITEM:
    description: "向 JSON 对象添加字段"

# ============================================================
# 8. LVGL
# ============================================================

lvgl:
  TIMER_HANDLER:
    description: "LVGL 主循环处理函数"
    checker_hints:
      - only_in_lvgl_task
      - no_block_inside
      - call_frequency_match_refresh
  ASYNC_CALL:
    description: "异步 UI 刷新"
    semantics: "user_data 必须堆分配，仅在回调中释放"
  OBJ_CREATE:
    description: "创建 UI 对象"
    checker_hints:
      - only_from_lvgl_task
  OBJ_SET:
    description: "设置 UI 对象属性（文本/值/样式等）"
    checker_hints:
      - only_from_lvgl_task
  OBJ_DELETE:
    description: "删除 UI 对象"
  DISP_DRV_REG:
    description: "注册显示驱动"
    semantics: "必须设置 hor_res/ver_res/flush_cb/draw_buf"

# ============================================================
# 9. 网络 / Socket
# ============================================================

network:
  SOCKET_RECV:
    description: "Socket 接收数据"
    checker_hints:
      - must_have_timeout
  SOCKET_SEND:
    description: "Socket 发送数据"
    checker_hints:
      - must_have_timeout
  SOCKET_CONNECT:
    description: "Socket 建立连接"
    checker_hints:
      - must_have_timeout
      - needs_backoff
  SOCKET_ACCEPT:
    description: "Socket 接受连接"
  SOCKET_SET_TIMEOUT:
    description: "设置 Socket 超时（SO_RCVTIMEO/SO_SNDTIMEO）"

# ============================================================
# 10. TLS
# ============================================================

tls:
  TLS_READ:
    description: "TLS 读取数据"
    checker_hints:
      - must_have_timeout
  TLS_WRITE:
    description: "TLS 写入数据"
  TLS_HANDSHAKE:
    description: "TLS 握手"
    checker_hints:
      - must_have_timeout
      - snpt_before_tls

# ============================================================
# 11. NVS / 存储
# ============================================================

storage:
  NVS_WRITE:
    description: "写入 NVS 键值"
    checker_hints:
      - must_commit
  NVS_COMMIT:
    description: "提交 NVS 更改到 Flash"
    checker_hints:
      - must_check_return
  NVS_CLOSE:
    description: "关闭 NVS 句柄"
  FLASH_WRITE:
    description: "Flash 页写入"
  FLASH_ERASE:
    description: "Flash 扇区擦除"

# ============================================================
# 12. OTA / 固件升级
# ============================================================

ota:
  OTA_BEGIN:
    description: "开始 OTA 写入"
  OTA_WRITE:
    description: "写入 OTA 数据块"
  OTA_END:
    description: "完成 OTA 写入"
  OTA_MARK_VALID:
    description: "标记固件有效，取消回滚"
    checker_hints:
      - mandatory_first_boot
  OTA_ROLLBACK:
    description: "回滚到上一固件"

# ============================================================
# 13. GPIO / 外设驱动
# ============================================================

peripheral:
  GPIO_CONFIG:
    description: "配置 GPIO 方向/模式/上下拉"
    checker_hints:
      - must_before_set_level
  GPIO_SET:
    description: "设置 GPIO 输出电平"
  GPIO_GET:
    description: "读取 GPIO 输入电平"
  I2C_TRANSFER:
    description: "I2C 总线读写传输"
    checker_hints:
      - must_have_timeout
  SPI_TRANSFER:
    description: "SPI 总线读写传输"
  ADC_CONFIG:
    description: "ADC 通道配置"

# ============================================================
# 14. 电源管理
# ============================================================

power:
  DEEP_SLEEP:
    description: "进入深度睡眠"
    checker_hints:
      - must_save_state
      - must_power_down_peripherals
  LIGHT_SLEEP:
    description: "进入轻度睡眠"
  SLEEP_WAKEUP_CAUSE:
    description: "查询唤醒原因"
    semantics: "唤醒后必须检查，决定恢复还是全量初始化"
  PERIPHERAL_POWER_DOWN:
    description: "外设断电（WiFi/I2S/SPI/LED 等）"

# ============================================================
# 14b. 媒体编解码
# ============================================================

media_codec:
  CODEC_OPEN:
    description: "打开/初始化编解码器"
    checker_hints:
      - hot_path_forbidden
      - no_per_frame_create
  CODEC_CLOSE:
    description: "关闭/释放编解码器"

# ============================================================
# 15. 日志
# ============================================================

logging:
  LOG_WRITE:
    description: "平台日志宏输出"
    checker_hints:
      - isr_forbidden
      - hot_path_forbidden
  PRINTF:
    description: "标准 printf/puts 输出"
    checker_hints:
      - isr_forbidden
      - use_platform_log_instead
  LOG_DESENSITIZE:
    description: "日志脱敏检查"
    semantics: "密码/token/key 不得明文打印"

# ============================================================
# 16. 系统时间
# ============================================================

time:
  TICK_GET:
    description: "获取系统 tick 计数"
  TICK_GET_FROM_ISR:
    description: "ISR 中获取系统 tick"
  TICK_TO_MS:
    description: "tick 转毫秒"
  MS_TO_TICKS_OP:
    description: "毫秒转 tick（操作，非常量）"

# ============================================================
# 17. WiFi / 网络连接
# ============================================================

wifi:
  WIFI_CONNECT:
    description: "WiFi 连接"
    checker_hints:
      - needs_backoff
      - no_tight_loop
  WIFI_DISCONNECT:
    description: "WiFi 断开"
  WIFI_EVENT_REGISTER:
    description: "注册 WiFi 事件回调"
  WIFI_EVENT_UNREGISTER:
    description: "注销 WiFi 事件回调"

# ============================================================
# 18. 看门狗
# ============================================================

watchdog:
  WDT_ADD:
    description: "任务注册到看门狗"
  WDT_RESET:
    description: "喂狗"
  WDT_INIT:
    description: "看门狗初始化"
