<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Initial Page Preview</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #1d2419; }
    .screen { position: relative; width: 480px; height: 800px; overflow: hidden; background: #79a05f; }
    img { position: absolute; display: block; user-select: none; pointer-events: none; }
    .bg { inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .pet { left: 95px; top: 123px; width: 305px; height: 428px; }
  </style>
</head>
<body>
  <div class="screen">
    <img class="bg" src="assets/initial_page_bg.jpg" alt="">
    <img class="pet" src="assets/initial_page_pet.png" alt="">
  </div>
</body>
</html>
