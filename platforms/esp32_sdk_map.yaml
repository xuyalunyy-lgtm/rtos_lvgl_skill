# ESP32 Platform SDK Mapping
# Standard operations → ESP-IDF v5.x (FreeRTOS) specific APIs

platform: esp32
sdk: ESP-IDF v5.x
rtos: FreeRTOS

mappings:

  # ---- RTOS Semaphores ----
  SEM_CREATE:
    apis: ["xSemaphoreCreateBinary", "xSemaphoreCreateCounting", "xSemaphoreCreateMutex"]
    headers: ["freertos/semphr.h"]
  SEM_TAKE:
    apis: ["xSemaphoreTake"]
    headers: ["freertos/semphr.h"]
    timeout_param_index: 1
    timeout_infinite: "portMAX_DELAY"
    isr_safe: false
    isr_variant: null
  SEM_GIVE:
    apis: ["xSemaphoreGive"]
    headers: ["freertos/semphr.h"]
    isr_variant: "xSemaphoreGiveFromISR"
  SEM_DELETE:
    apis: ["vSemaphoreDelete"]
    headers: ["freertos/semphr.h"]

  # ---- RTOS Mutexes ----
  MUTEX_CREATE:
    apis: ["xSemaphoreCreateMutex"]
    headers: ["freertos/semphr.h"]
  MUTEX_LOCK:
    apis: ["xSemaphoreTake"]
    headers: ["freertos/semphr.h"]
    timeout_param_index: 1
  MUTEX_UNLOCK:
    apis: ["xSemaphoreGive"]
    headers: ["freertos/semphr.h"]
  MUTEX_DELETE:
    apis: ["vSemaphoreDelete"]
    headers: ["freertos/semphr.h"]

  # ---- RTOS Queues ----
  QUEUE_CREATE:
    apis: ["xQueueCreate", "xQueueCreateStatic", "xQueueGenericCreate"]
    headers: ["freertos/queue.h"]
  QUEUE_SEND:
    apis: ["xQueueSend", "xQueueSendToBack", "xQueueSendToFront", "xQueueGenericSend", "xQueueSendFromISR"]
    headers: ["freertos/queue.h"]
    isr_variant: "xQueueSendFromISR"
  QUEUE_RECV:
    apis: ["xQueueReceive"]
    headers: ["freertos/queue.h"]
    timeout_param_index: 1
  QUEUE_OVERWRITE:
    apis: ["xQueueOverwrite"]
    headers: ["freertos/queue.h"]
    isr_variant: "xQueueOverwriteFromISR"
  QUEUE_DELETE:
    apis: ["vQueueDelete"]
    headers: ["freertos/queue.h"]

  # ---- RTOS Tasks ----
  TASK_CREATE:
    apis: ["xTaskCreate", "xTaskCreatePinnedToCore", "xTaskCreateStatic"]
    headers: ["freertos/task.h"]
    stack_unit: "words"
  TASK_DELETE:
    apis: ["vTaskDelete"]
    headers: ["freertos/task.h"]
  TASK_DELAY:
    apis: ["vTaskDelay", "vTaskDelayUntil"]
    headers: ["freertos/task.h"]
    isr_safe: false
  TASK_NOTIFY_GIVE:
    apis: ["xTaskNotify", "xTaskNotifyGive"]
    headers: ["freertos/task.h"]
    isr_variant: "xTaskNotifyFromISR"
  TASK_NOTIFY_TAKE:
    apis: ["xTaskNotifyWait", "ulTaskNotifyTake"]
    headers: ["freertos/task.h"]
  TASK_PRIORITY_SET:
    apis: ["vTaskPrioritySet"]
    headers: ["freertos/task.h"]

  # ---- RTOS Timers ----
  TIMER_CREATE:
    apis: ["xTimerCreate", "xTimerCreateStatic"]
    headers: ["freertos/timers.h"]
  TIMER_START:
    apis: ["xTimerStart"]
    headers: ["freertos/timers.h"]
  TIMER_STOP:
    apis: ["xTimerStop"]
    headers: ["freertos/timers.h"]
  TIMER_DELETE:
    apis: ["xTimerDelete"]
    headers: ["freertos/timers.h"]

  # ---- RTOS Critical Section ----
  CRITICAL_ENTER:
    apis: ["taskENTER_CRITICAL", "portENTER_CRITICAL", "portENTER_CRITICAL_FROM_ISR"]
    headers: ["freertos/portmacro.h"]
  CRITICAL_EXIT:
    apis: ["taskEXIT_CRITICAL", "portEXIT_CRITICAL", "portEXIT_CRITICAL_FROM_ISR"]
    headers: ["freertos/portmacro.h"]
  IRQ_DISABLE:
    apis: ["portDISABLE_INTERRUPTS"]
    headers: ["freertos/portmacro.h"]
  IRQ_ENABLE:
    apis: ["portENABLE_INTERRUPTS"]
    headers: ["freertos/portmacro.h"]
  IRQ_YIELD:
    apis: ["portYIELD_FROM_ISR"]
    headers: ["freertos/portmacro.h"]

  # ---- Memory ----
  HEAP_ALLOC:
    apis: ["pvPortMalloc", "malloc", "calloc", "heap_caps_malloc", "heap_caps_calloc", "heap_caps_realloc"]
    headers: ["freertos/portmacro.h", "stdlib.h", "esp_heap_caps.h"]
  HEAP_FREE:
    apis: ["vPortFree", "free", "heap_caps_free"]
    headers: ["freertos/portmacro.h", "stdlib.h", "esp_heap_caps.h"]
  HEAP_ALLOC_DMA:
    apis: ["heap_caps_malloc"]
    headers: ["esp_heap_caps.h"]
    capability_flag: "MALLOC_CAP_DMA"
  HEAP_ALLOC_EXTERNAL:
    apis: ["heap_caps_malloc"]
    headers: ["esp_heap_caps.h"]
    capability_flag: "MALLOC_CAP_SPIRAM"
  HEAP_FREE_SIZE:
    apis: ["xPortGetFreeHeapSize", "heap_caps_get_free_size", "heap_caps_get_minimum_free_size"]
    headers: ["freertos/portable.h", "esp_heap_caps.h"]
  MEM_POOL_ALLOC:
    apis: []
    headers: []
    unsupported: true
    reason: "ESP-IDF has no standard static memory pool API, use heap_caps or custom allocator"

  # ---- Constants ----
  TIMEOUT_FOREVER:
    value: "portMAX_DELAY"
  TIMEOUT_ZERO:
    value: "0"
  MS_TO_TICKS:
    value: "pdMS_TO_TICKS"

  # ---- cJSON ----
  PARSE:
    apis: ["cJSON_Parse", "cJSON_ParseWithLength", "cJSON_ParseWithOpts"]
    headers: ["cJSON.h"]
  DELETE:
    apis: ["cJSON_Delete"]
    headers: ["cJSON.h"]
  CREATE:
    apis: ["cJSON_CreateObject", "cJSON_CreateArray", "cJSON_CreateString",
           "cJSON_CreateNumber", "cJSON_CreateBool", "cJSON_CreateNull"]
    headers: ["cJSON.h"]
  ADD_ITEM:
    apis: ["cJSON_AddItemToObject", "cJSON_AddItemToArray"]
    headers: ["cJSON.h"]

  # ---- LVGL ----

  TIMER_HANDLER:
    apis: ["lv_timer_handler"]
    headers: ["lvgl.h"]
  ASYNC_CALL:
    apis: ["lv_async_call"]
    headers: ["lvgl.h"]
  OBJ_CREATE:
    apis: ["lv_obj_create", "lv_label_create", "lv_btn_create",
           "lv_bar_create", "lv_img_create", "lv_list_create"]
    headers: ["lvgl.h"]
  OBJ_SET:
    apis: ["lv_label_set_text", "lv_bar_set_value", "lv_obj_set_style",
           "lv_img_set_src", "lv_obj_set_pos", "lv_obj_set_size"]
    headers: ["lvgl.h"]
  OBJ_DELETE:
    apis: ["lv_obj_del", "lv_obj_clean"]
    headers: ["lvgl.h"]
  DISP_DRV_REG:
    apis: ["lv_disp_drv_register", "lv_disp_drv_init"]
    headers: ["lvgl.h"]

  # ---- 网络 Socket ----
  SOCKET_RECV:
    apis: ["recv", "lwip_recv"]
    headers: ["sys/socket.h", "lwip/sockets.h"]
  SOCKET_SEND:
    apis: ["send", "lwip_send"]
    headers: ["sys/socket.h", "lwip/sockets.h"]
  SOCKET_CONNECT:
    apis: ["connect", "lwip_connect"]
    headers: ["sys/socket.h", "lwip/sockets.h"]
  SOCKET_ACCEPT:
    apis: ["accept"]
    headers: ["sys/socket.h"]
  SOCKET_SET_TIMEOUT:
    apis: ["setsockopt"]
    headers: ["sys/socket.h"]
    option: "SO_RCVTIMEO"

  # ---- TLS ----
  TLS_READ:
    apis: ["mbedtls_ssl_read"]
    headers: ["mbedtls/ssl.h"]
  TLS_WRITE:
    apis: ["mbedtls_ssl_write"]
    headers: ["mbedtls/ssl.h"]
  TLS_HANDSHAKE:
    apis: ["mbedtls_ssl_handshake", "esp_tls_conn_new_sync", "esp_tls_conn_read"]
    headers: ["mbedtls/ssl.h", "esp_tls.h"]

  # ---- NVS ----
  NVS_WRITE:
    apis: ["nvs_set_u8", "nvs_set_i8", "nvs_set_u16", "nvs_set_i16",
           "nvs_set_u32", "nvs_set_i32", "nvs_set_u64", "nvs_set_i64",
           "nvs_set_str", "nvs_set_blob"]
    headers: ["nvs.h"]
  NVS_COMMIT:
    apis: ["nvs_commit"]
    headers: ["nvs.h"]
  NVS_CLOSE:
    apis: ["nvs_close"]
    headers: ["nvs.h"]
  FLASH_WRITE:
    apis: ["esp_flash_write", "spi_flash_write"]
    headers: ["esp_flash.h", "spi_flash.h"]
  FLASH_ERASE:
    apis: ["esp_flash_erase_region", "spi_flash_erase_sector"]
    headers: ["esp_flash.h", "spi_flash.h"]

  # ---- OTA ----
  OTA_BEGIN:
    apis: ["esp_ota_begin"]
    headers: ["esp_ota.h"]
  OTA_WRITE:
    apis: ["esp_ota_write"]
    headers: ["esp_ota.h"]
  OTA_END:
    apis: ["esp_ota_end"]
    headers: ["esp_ota.h"]
  OTA_MARK_VALID:
    apis: ["esp_ota_mark_app_valid_cancel_rollback"]
    headers: ["esp_ota.h"]
  OTA_ROLLBACK:
    apis: ["esp_ota_mark_app_invalid_rollback_and_reboot"]
    headers: ["esp_ota.h"]

  # ---- GPIO ----
  GPIO_CONFIG:
    apis: ["gpio_config", "gpio_set_direction"]
    headers: ["driver/gpio.h"]
  GPIO_SET:
    apis: ["gpio_set_level"]
    headers: ["driver/gpio.h"]
  GPIO_GET:
    apis: ["gpio_get_level"]
    headers: ["driver/gpio.h"]
  I2C_TRANSFER:
    apis: ["i2c_master_transmit", "i2c_master_receive", "i2c_master_transmit_receive"]
    headers: ["driver/i2c_master.h"]
  SPI_TRANSFER:
    apis: ["spi_device_transmit", "spi_device_polling_transmit"]
    headers: ["driver/spi_master.h"]
  ADC_CONFIG:
    apis: ["adc1_config_channel_atten"]
    headers: ["driver/adc.h"]

  # ---- 电源 ----
  DEEP_SLEEP:
    apis: ["esp_deep_sleep_start", "esp_deep_sleep"]
    headers: ["esp_sleep.h"]
  LIGHT_SLEEP:
    apis: ["esp_light_sleep_start"]
    headers: ["esp_sleep.h"]
  SLEEP_WAKEUP_CAUSE:
    apis: ["esp_sleep_get_wakeup_cause"]
    headers: ["esp_sleep.h"]
  PERIPHERAL_POWER_DOWN:
    apis: ["esp_wifi_stop", "esp_wifi_deinit", "i2s_channel_disable",
           "ledc_stop", "spi_bus_free", "i2c_driver_delete"]
    headers: ["esp_wifi.h", "driver/i2s_std.h", "driver/ledc.h",
              "driver/spi_master.h", "driver/i2c_master.h"]

  # ---- 媒体编解码 ----
  CODEC_OPEN:
    apis: ["opus_encoder_create", "opus_decoder_create", "codec_open", "codec_init",
           "jpeg_decoder_init", "h264_decoder_init", "aac_encoder_open", "aac_decoder_open"]
    headers: []
  CODEC_CLOSE:
    apis: ["opus_encoder_destroy", "opus_decoder_destroy", "codec_close", "codec_deinit"]
    headers: []

  # ---- 日志脱敏 ----
  LOG_DESENSITIZE:
    apis: []
    headers: []
    unsupported: true
    reason: "Checker-level concept, not an SDK API"

  # ---- 日志 ----
  LOG_WRITE:
    apis: ["ESP_LOGE", "ESP_LOGW", "ESP_LOGI", "ESP_LOGD", "ESP_LOGV",
           "ESP_LOG_LEVEL_LOCAL", "ESP_LOG_LEVEL"]
    headers: ["esp_log.h"]
  PRINTF:
    apis: ["printf", "puts", "fprintf"]
    headers: ["stdio.h"]

  # ---- 时间 ----
  TICK_GET:
    apis: ["xTaskGetTickCount"]
    headers: ["freertos/task.h"]
  TICK_GET_FROM_ISR:
    apis: ["xTaskGetTickCountFromISR"]
    headers: ["freertos/task.h"]
  TICK_TO_MS:
    apis: ["pdTICKS_TO_MS"]
    headers: ["freertos/projdefs.h"]
  MS_TO_TICKS_OP:
    apis: ["pdMS_TO_TICKS"]
    headers: ["freertos/projdefs.h"]

  # ---- WiFi ----
  WIFI_CONNECT:
    apis: ["esp_wifi_connect"]
    headers: ["esp_wifi.h"]
  WIFI_DISCONNECT:
    apis: ["esp_wifi_disconnect"]
    headers: ["esp_wifi.h"]
  WIFI_EVENT_REGISTER:
    apis: ["esp_event_handler_register", "esp_event_handler_instance_register"]
    headers: ["esp_event.h"]
  WIFI_EVENT_UNREGISTER:
    apis: ["esp_event_handler_unregister", "esp_event_handler_instance_unregister"]
    headers: ["esp_event.h"]

  # ---- 看门狗 ----
  WDT_ADD:
    apis: ["esp_task_wdt_add"]
    headers: ["esp_task_wdt.h"]
  WDT_RESET:
    apis: ["esp_task_wdt_reset"]
    headers: ["esp_task_wdt.h"]
  WDT_INIT:
    apis: ["esp_task_wdt_init"]
    headers: ["esp_task_wdt.h"]

  # ---- OTA 验证 ----
  OTA_VERIFY:
    apis: ["esp_image_verify", "esp_secure_boot_verify_signature", "esp_ota_verify_signature"]
    headers: ["esp_image_format.h", "esp_secure_boot.h", "esp_ota.h"]
  OTA_SECURE_BOOT:
    apis: ["esp_secure_boot_enabled"]
    headers: ["esp_secure_boot.h"]
    config_keys: ["CONFIG_SECURE_BOOT", "CONFIG_SECURE_BOOT_V2_ENABLED", "CONFIG_SECURE_SIGNED_APPS"]

  # ---- Cache / DMA 同步 ----
  CACHE_CLEAN:
    apis: ["esp_cache_msync"]
    headers: ["esp_cache.h"]
    flags: ["ESP_CACHE_MSYNC_FLAG_DIR_C2M"]
  CACHE_INVALIDATE:
    apis: ["esp_cache_msync"]
    headers: ["esp_cache.h"]
    flags: ["ESP_CACHE_MSYNC_FLAG_DIR_M2C"]
  DMA_BUFFER_SYNC:
    apis: ["esp_cache_msync"]
    headers: ["esp_cache.h"]
    flags: ["ESP_CACHE_MSYNC_FLAG_DIR_C2M", "ESP_CACHE_MSYNC_FLAG_DIR_M2C"]
