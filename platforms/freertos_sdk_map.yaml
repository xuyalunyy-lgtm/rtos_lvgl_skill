# Generic FreeRTOS SDK mapping.  Peripheral, network and OTA APIs intentionally
# remain unsupported here because they belong to the selected BSP/SDK layer.
platform: freertos
sdk: FreeRTOS kernel portability layer
rtos: FreeRTOS

mappings:
  SEM_CREATE:
    apis: ["xSemaphoreCreateBinary", "xSemaphoreCreateCounting", "xSemaphoreCreateMutex"]
  SEM_TAKE:
    apis: ["xSemaphoreTake"]
    timeout_infinite: "portMAX_DELAY"
  SEM_GIVE:
    apis: ["xSemaphoreGive"]
    isr_variant: "xSemaphoreGiveFromISR"
  SEM_DELETE:
    apis: ["vSemaphoreDelete"]
  MUTEX_CREATE:
    apis: ["xSemaphoreCreateMutex"]
  MUTEX_LOCK:
    apis: ["xSemaphoreTake"]
  MUTEX_UNLOCK:
    apis: ["xSemaphoreGive"]
  MUTEX_DELETE:
    apis: ["vSemaphoreDelete"]
  QUEUE_CREATE:
    apis: ["xQueueCreate", "xQueueCreateStatic"]
  QUEUE_SEND:
    apis: ["xQueueSend", "xQueueSendToBack", "xQueueSendFromISR"]
  QUEUE_RECV:
    apis: ["xQueueReceive"]
  QUEUE_OVERWRITE:
    apis: ["xQueueOverwrite"]
  QUEUE_DELETE:
    apis: ["vQueueDelete"]
  TASK_CREATE:
    apis: ["xTaskCreate", "xTaskCreateStatic"]
    stack_unit: "words"
  TASK_DELETE:
    apis: ["vTaskDelete"]
  TASK_DELAY:
    apis: ["vTaskDelay", "vTaskDelayUntil"]
  TASK_NOTIFY_GIVE:
    apis: ["xTaskNotify", "xTaskNotifyGive"]
  TASK_NOTIFY_TAKE:
    apis: ["xTaskNotifyWait", "ulTaskNotifyTake"]
  TASK_PRIORITY_SET:
    apis: ["vTaskPrioritySet"]
  TIMER_CREATE:
    apis: ["xTimerCreate", "xTimerCreateStatic"]
  TIMER_START:
    apis: ["xTimerStart"]
  TIMER_STOP:
    apis: ["xTimerStop"]
  TIMER_DELETE:
    apis: ["xTimerDelete"]
  CRITICAL_ENTER:
    apis: ["taskENTER_CRITICAL", "portENTER_CRITICAL"]
  CRITICAL_EXIT:
    apis: ["taskEXIT_CRITICAL", "portEXIT_CRITICAL"]
  IRQ_DISABLE:
    apis: ["portDISABLE_INTERRUPTS"]
  IRQ_ENABLE:
    apis: ["portENABLE_INTERRUPTS"]
  IRQ_YIELD:
    apis: ["portYIELD_FROM_ISR"]
  HEAP_ALLOC:
    apis: ["pvPortMalloc", "malloc", "calloc"]
  HEAP_FREE:
    apis: ["vPortFree", "free"]
  HEAP_ALLOC_DMA:
    unsupported: true
  HEAP_ALLOC_EXTERNAL:
    unsupported: true
  HEAP_FREE_SIZE:
    apis: ["xPortGetFreeHeapSize", "xPortGetMinimumEverFreeHeapSize"]
  MEM_POOL_ALLOC:
    unsupported: true
  TIMEOUT_FOREVER:
    value: "portMAX_DELAY"
  TIMEOUT_ZERO:
    value: "0"
  MS_TO_TICKS:
    value: "pdMS_TO_TICKS"
  PARSE:
    apis: ["cJSON_Parse", "cJSON_ParseWithLength", "cJSON_ParseWithOpts"]
  DELETE:
    apis: ["cJSON_Delete"]
  CREATE:
    apis: ["cJSON_CreateObject", "cJSON_CreateArray"]
  ADD_ITEM:
    apis: ["cJSON_AddItemToObject", "cJSON_AddItemToArray"]
  TIMER_HANDLER:
    apis: ["lv_timer_handler"]
  ASYNC_CALL:
    apis: ["lv_async_call"]
  OBJ_CREATE:
    apis: ["lv_obj_create", "lv_label_create", "lv_btn_create"]
  OBJ_SET:
    apis: ["lv_label_set_text", "lv_bar_set_value", "lv_obj_set_style"]
  OBJ_DELETE:
    apis: ["lv_obj_del"]
  DISP_DRV_REG:
    apis: ["lv_disp_drv_register", "lv_disp_drv_init"]
  SOCKET_RECV:
    apis: ["recv"]
  SOCKET_SEND:
    apis: ["send"]
  SOCKET_CONNECT:
    apis: ["connect"]
  SOCKET_ACCEPT:
    apis: ["accept"]
  SOCKET_SET_TIMEOUT:
    apis: ["setsockopt"]
  TLS_READ:
    apis: ["mbedtls_ssl_read"]
  TLS_WRITE:
    apis: ["mbedtls_ssl_write"]
  TLS_HANDSHAKE:
    apis: ["mbedtls_ssl_handshake"]
  NVS_WRITE:
    unsupported: true
  NVS_COMMIT:
    unsupported: true
  NVS_CLOSE:
    unsupported: true
  FLASH_WRITE:
    unsupported: true
  FLASH_ERASE:
    unsupported: true
  OTA_BEGIN:
    unsupported: true
  OTA_WRITE:
    unsupported: true
  OTA_END:
    unsupported: true
  OTA_MARK_VALID:
    unsupported: true
  OTA_ROLLBACK:
    unsupported: true
  GPIO_CONFIG:
    unsupported: true
  GPIO_SET:
    unsupported: true
  GPIO_GET:
    unsupported: true
  I2C_TRANSFER:
    unsupported: true
  SPI_TRANSFER:
    unsupported: true
  ADC_CONFIG:
    unsupported: true
  DEEP_SLEEP:
    unsupported: true
  LIGHT_SLEEP:
    unsupported: true
  SLEEP_WAKEUP_CAUSE:
    unsupported: true
  PERIPHERAL_POWER_DOWN:
    unsupported: true
  CODEC_OPEN:
    unsupported: true
  CODEC_CLOSE:
    unsupported: true
  LOG_WRITE:
    apis: ["printf"]
  PRINTF:
    apis: ["printf", "puts", "fprintf"]
  LOG_DESENSITIZE:
    unsupported: true
  TICK_GET:
    apis: ["xTaskGetTickCount"]
  TICK_GET_FROM_ISR:
    apis: ["xTaskGetTickCountFromISR"]
  TICK_TO_MS:
    apis: ["pdTICKS_TO_MS"]
  MS_TO_TICKS_OP:
    apis: ["pdMS_TO_TICKS"]
  WIFI_CONNECT:
    unsupported: true
  WIFI_DISCONNECT:
    unsupported: true
  WIFI_EVENT_REGISTER:
    unsupported: true
  WIFI_EVENT_UNREGISTER:
    unsupported: true
  WDT_ADD:
    unsupported: true
  WDT_RESET:
    unsupported: true
  WDT_INIT:
    unsupported: true
  OTA_VERIFY:
    unsupported: true
  OTA_SECURE_BOOT:
    unsupported: true
  CACHE_CLEAN:
    unsupported: true
  CACHE_INVALIDATE:
    unsupported: true
  DMA_BUFFER_SYNC:
    unsupported: true
