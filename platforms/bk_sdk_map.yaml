# BK (Beken) Platform SDK Mapping
# Standard operations → bk_idk / Armino (FreeRTOS v10) specific APIs

platform: bk
sdk: bk_idk / Armino
rtos: FreeRTOS v10 (via rtos_* wrapper)

mappings:

  # ---- RTOS Semaphores ----
  SEM_CREATE:
    apis: ["rtos_init_semaphore"]
    headers: ["<os/os.h>"]
  SEM_TAKE:
    apis: ["rtos_get_semaphore"]
    headers: ["<os/os.h>"]
    timeout_param_index: 1
    timeout_infinite: "BEKEN_WAIT_FOREVER"
    isr_safe: false
  SEM_GIVE:
    apis: ["rtos_set_semaphore"]
    headers: ["<os/os.h>"]
  SEM_DELETE:
    apis: ["rtos_deinit_semaphore"]
    headers: ["<os/os.h>"]

  # ---- RTOS Mutexes ----
  MUTEX_CREATE:
    apis: ["rtos_init_mutex"]
    headers: ["<os/os.h>"]
  MUTEX_LOCK:
    apis: ["rtos_lock_mutex"]
    headers: ["<os/os.h>"]
  MUTEX_UNLOCK:
    apis: ["rtos_unlock_mutex"]
    headers: ["<os/os.h>"]
  MUTEX_DELETE:
    apis: ["rtos_deinit_mutex"]
    headers: ["<os/os.h>"]

  # ---- RTOS Queues ----
  QUEUE_CREATE:
    apis: ["rtos_init_queue"]
    headers: ["<os/os.h>"]
  QUEUE_SEND:
    apis: ["rtos_push_to_queue"]
    headers: ["<os/os.h>"]
    timeout_param_index: 2
    note: "timeout=0 is non-blocking (BEKEN_NO_WAIT), not wait forever"
  QUEUE_RECV:
    apis: ["rtos_pop_from_queue"]
    headers: ["<os/os.h>"]
    timeout_param_index: 2
  QUEUE_OVERWRITE:
    apis: []
    headers: []
    unsupported: true
    reason: "BK SDK has no queue overwrite API"
  QUEUE_DELETE:
    apis: ["rtos_deinit_queue"]
    headers: ["<os/os.h>"]

  # ---- RTOS Tasks ----
  TASK_CREATE:
    apis: ["rtos_create_thread"]
    headers: ["<os/os.h>"]
    stack_unit: "bytes"
  TASK_DELETE:
    apis: ["rtos_delete_thread"]
    headers: ["<os/os.h>"]
    note: "Pass NULL to delete the current thread"
  TASK_DELAY:
    apis: ["rtos_delay_milliseconds"]
    headers: ["<os/os.h>"]
    isr_safe: false
  TASK_NOTIFY_GIVE:
    apis: []
    headers: []
    unsupported: true
    reason: "BK SDK has no task notify, use queues or semaphores instead"
  TASK_NOTIFY_TAKE:
    apis: []
    headers: []
    unsupported: true
    reason: "BK SDK has no task notify API"
  TASK_PRIORITY_SET:
    apis: []
    headers: []
    unsupported: true
    reason: "BK SDK has no runtime priority modification API"

  # ---- RTOS Timers ----
  TIMER_CREATE:
    apis: ["rtos_init_timer"]
    headers: ["<os/os.h>"]
  TIMER_START:
    apis: ["rtos_start_timer"]
    headers: ["<os/os.h>"]
  TIMER_STOP:
    apis: ["rtos_stop_timer"]
    headers: ["<os/os.h>"]
  TIMER_DELETE:
    apis: ["rtos_deinit_timer"]
    headers: ["<os/os.h>"]

  # ---- RTOS Critical Section ----
  CRITICAL_ENTER:
    apis: ["rtos_enter_critical"]
    headers: ["<os/os.h>"]
  CRITICAL_EXIT:
    apis: ["rtos_exit_critical"]
    headers: ["<os/os.h>"]
  IRQ_DISABLE:
    apis: ["portDISABLE_INTERRUPTS"]
    headers: ["freertos/portmacro.h"]
  IRQ_ENABLE:
    apis: ["portENABLE_INTERRUPTS"]
    headers: ["freertos/portmacro.h"]
  IRQ_YIELD:
    apis: ["portYIELD_FROM_ISR"]
    headers: ["freertos/portmacro.h"]

  # ---- Memory ----
  HEAP_ALLOC:
    apis: ["rtos_malloc", "malloc", "pvPortMalloc"]
    headers: ["<os/os.h>", "stdlib.h", "freertos/portable.h"]
  HEAP_FREE:
    apis: ["rtos_free", "free", "vPortFree"]
    headers: ["<os/os.h>", "stdlib.h", "freertos/portable.h"]
  HEAP_ALLOC_DMA:
    apis: ["rtos_malloc"]
    headers: ["<os/os.h>"]
    note: "BK7258 driver manages DMA buffer"
  HEAP_ALLOC_EXTERNAL:
    apis: ["psram_malloc"]
    headers: ["<os/os.h>"]
    note: "BK7258 supports PSRAM"
  HEAP_FREE_SIZE:
    apis: ["xPortGetFreeHeapSize", "xPortGetMinimumEverFreeHeapSize"]
    headers: ["freertos/portable.h"]
  MEM_POOL_ALLOC:
    apis: []
    headers: []
    unsupported: true
    reason: "BK SDK has no static memory pool API"

  # ---- Constants ----
  TIMEOUT_FOREVER:
    value: "BEKEN_WAIT_FOREVER"
    numeric: "0xFFFFFFFF"
  TIMEOUT_ZERO:
    value: "BEKEN_NO_WAIT"
    numeric: "0"
  MS_TO_TICKS:
    value: "1"
    note: "BK API accepts milliseconds directly"

  # ---- cJSON ----
  PARSE:
    apis: ["cJSON_Parse"]
    headers: ["cJSON.h"]
  DELETE:
    apis: ["cJSON_Delete"]
    headers: ["cJSON.h"]
  CREATE:
    apis: ["cJSON_CreateObject", "cJSON_CreateArray"]
    headers: ["cJSON.h"]
  ADD_ITEM:
    apis: ["cJSON_AddItemToObject", "cJSON_AddItemToArray"]
    headers: ["cJSON.h"]

  # ---- LVGL ----
  TIMER_HANDLER:
    apis: ["lv_timer_handler"]
    headers: ["lvgl.h"]
  ASYNC_CALL:
    apis: ["lv_async_call"]
    headers: ["lvgl.h"]
  OBJ_CREATE:
    apis: ["lv_obj_create", "lv_label_create", "lv_btn_create"]
    headers: ["lvgl.h"]
  OBJ_SET:
    apis: ["lv_label_set_text", "lv_bar_set_value", "lv_obj_set_style"]
    headers: ["lvgl.h"]
  OBJ_DELETE:
    apis: ["lv_obj_del"]
    headers: ["lvgl.h"]
  DISP_DRV_REG:
    apis: ["lv_disp_drv_register", "lv_disp_drv_init"]
    headers: ["lvgl.h"]

  # ---- Network Socket ----
  SOCKET_RECV:
    apis: ["recv", "lwip_recv"]
    headers: ["lwip/sockets.h"]
  SOCKET_SEND:
    apis: ["send", "lwip_send"]
    headers: ["lwip/sockets.h"]
  SOCKET_CONNECT:
    apis: ["connect", "lwip_connect"]
    headers: ["lwip/sockets.h"]
  SOCKET_ACCEPT:
    apis: ["accept"]
    headers: ["lwip/sockets.h"]
  SOCKET_SET_TIMEOUT:
    apis: ["setsockopt"]
    headers: ["lwip/sockets.h"]

  # ---- TLS ----
  TLS_READ:
    apis: ["mbedtls_ssl_read"]
    headers: ["mbedtls/ssl.h"]
  TLS_WRITE:
    apis: ["mbedtls_ssl_write"]
    headers: ["mbedtls/ssl.h"]
  TLS_HANDSHAKE:
    apis: ["mbedtls_ssl_handshake"]
    headers: ["mbedtls/ssl.h"]

  # ---- NVS ----
  NVS_WRITE:
    apis: []
    headers: []
    unsupported: true
    reason: "BK uses easy_flash or flashdb, no standard NVS API"
  NVS_COMMIT:
    apis: []
    headers: []
    unsupported: true
    reason: "BK has no NVS API"
  NVS_CLOSE:
    apis: []
    headers: []
    unsupported: true
    reason: "BK has no NVS API"
  FLASH_WRITE:
    apis: ["flash_write"]
    headers: ["components/bk_flash.h"]
  FLASH_ERASE:
    apis: ["flash_erase"]
    headers: ["components/bk_flash.h"]

  # ---- OTA ----
  OTA_BEGIN:
    apis: ["bk_ota_start"]
    headers: ["components/bk_ota.h"]
  OTA_WRITE:
    apis: ["bk_ota_write"]
    headers: ["components/bk_ota.h"]
  OTA_END:
    apis: ["bk_ota_finish"]
    headers: ["components/bk_ota.h"]
  OTA_MARK_VALID:
    apis: []
    headers: []
    unsupported: true
    reason: "BK OTA partitions are managed by bootloader, no standard API"
  OTA_ROLLBACK:
    apis: []
    headers: []
    unsupported: true
    reason: "BK has no OTA rollback API"

  # ---- GPIO ----
  GPIO_CONFIG:
    apis: ["gpio_dev_unmap", "gpio_config"]
    headers: ["components/bk_gpio.h"]
  GPIO_SET:
    apis: ["gpio_output_set"]
    headers: ["components/bk_gpio.h"]
  GPIO_GET:
    apis: ["gpio_input_get"]
    headers: ["components/bk_gpio.h"]
  I2C_TRANSFER:
    apis: ["i2c_master_write", "i2c_master_read"]
    headers: ["components/bk_i2c.h"]
  SPI_TRANSFER:
    apis: ["spi_master_write", "spi_master_read"]
    headers: ["components/bk_spi.h"]
  ADC_CONFIG:
    apis: ["bk_adc_init"]
    headers: ["components/bk_adc.h"]

  # ---- Power ----
  DEEP_SLEEP:
    apis: ["bk_enter_deep_sleep"]
    headers: ["components/bk_pm.h"]
  LIGHT_SLEEP:
    apis: ["bk_enter_light_sleep"]
    headers: ["components/bk_pm.h"]
  SLEEP_WAKEUP_CAUSE:
    apis: ["bk_pm_get_wakeup_source"]
    headers: ["components/bk_pm.h"]
  PERIPHERAL_POWER_DOWN:
    apis: []
    headers: []
    unsupported: true
    reason: "BK SDK has no unified peripheral power-down API"

  CODEC_OPEN:
    apis: []
    headers: []
    unsupported: true
    reason: "Codec APIs are product/component specific on BK"
  CODEC_CLOSE:
    apis: []
    headers: []
    unsupported: true
    reason: "Codec APIs are product/component specific on BK"

  LOG_DESENSITIZE:
    apis: []
    headers: []
    unsupported: true
    reason: "Checker-level concept, not an SDK API"

  # ---- Logging ----
  LOG_WRITE:
    apis: ["BK_LOGI", "BK_LOGW", "BK_LOGE", "os_printf"]
    headers: ["<os/os.h>"]
  PRINTF:
    apis: ["os_printf", "printf"]
    headers: ["<os/os.h>", "stdio.h"]

  # ---- Time ----
  TICK_GET:
    apis: ["rtos_get_time"]
    headers: ["<os/os.h>"]
  TICK_GET_FROM_ISR:
    apis: ["rtos_get_time"]
    headers: ["<os/os.h>"]
  TICK_TO_MS:
    apis: []
    headers: []
    unsupported: true
    reason: "BK rtos_get_time returns milliseconds directly, no conversion needed"
  MS_TO_TICKS_OP:
    apis: []
    headers: []
    unsupported: true
    reason: "BK API accepts milliseconds directly, no conversion needed"

  # ---- WiFi ----
  WIFI_CONNECT:
    apis: ["bk_wifi_sta_connect"]
    headers: ["components/bk_wifi.h"]
  WIFI_DISCONNECT:
    apis: ["bk_wifi_sta_disconnect"]
    headers: ["components/bk_wifi.h"]
  WIFI_EVENT_REGISTER:
    apis: ["bk_event_register"]
    headers: ["components/event.h"]
  WIFI_EVENT_UNREGISTER:
    apis: ["bk_event_unregister"]
    headers: ["components/event.h"]

  OTA_VERIFY:
    apis: []
    headers: []
    unsupported: true
    reason: "Platform-specific OTA verification"
  OTA_SECURE_BOOT:
    apis: []
    headers: []
    unsupported: true
    reason: "Platform-specific secure boot"
  CACHE_CLEAN:
    apis: []
    headers: []
    unsupported: true
    reason: "Platform-specific cache operations"
  CACHE_INVALIDATE:
    apis: []
    headers: []
    unsupported: true
    reason: "Platform-specific cache operations"
  DMA_BUFFER_SYNC:
    apis: []
    headers: []
    unsupported: true
    reason: "Platform-specific DMA sync"

  # ---- Watchdog ----
  WDT_ADD:
    apis: []
    headers: []
    unsupported: true
    reason: "BK SDK has no task registration to watchdog API"
  WDT_RESET:
    apis: ["bk_wdt_feed"]
    headers: ["components/bk_wdt.h"]
  WDT_INIT:
    apis: ["bk_wdt_init"]
    headers: ["components/bk_wdt.h"]
